name: CI — NCRTC Fleet Management Platform

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ncrtc
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: fleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://ncrtc:testpassword@localhost:5432/fleet_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ --select E,W,F --ignore E501,E712

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v --tb=short

      - name: Run integration tests
        run: pytest tests/ -m integration -v --tb=short || true

  frontend-build:
    name: Frontend Type Check + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build
