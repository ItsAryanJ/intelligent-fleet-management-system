version: "3.9"

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: ncrtc-db
    environment:
      POSTGRES_DB: ncrtc_fleet
      POSTGRES_USER: ncrtc_admin
      POSTGRES_PASSWORD: ncrtc_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncrtc_admin -d ncrtc_fleet"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ncrtc-backend
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ncrtc_fleet
      - POSTGRES_USER=ncrtc_admin
      - POSTGRES_PASSWORD=ncrtc_secure_password_2024
      - APP_ENV=production
      - APP_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-ncrtc-prod-secret-key-change-in-production}
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://localhost:3000"]
      - GPS_SIMULATOR_ENABLED=true
      - DEMO_MODE=${DEMO_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── React Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ncrtc-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
